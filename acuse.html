<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acuse de Registro Oficial | Portal de Empleo</title>
    <!-- FontAwesome para iconos modernos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Variables de Estilo Dinámicas (Se actualizarán con JS según la empresa) */
        :root {
            --primary-color: #2563eb;
            --primary-dark: #1d4ed8;
            --bg-light: #f1f5f9;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --success-color: #10b981;
            --border-radius: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px 10px 40px 10px;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        /* Contenedor del Acuse (Efecto Ticket) */
        .ticket-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            position: relative;
        }

        /* Cabecera del Acuse */
        .ticket-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }

        /* Decoración de ondas SVG en la cabecera */
        .wave-decor {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15px;
            fill: var(--card-bg);
        }

        .ticket-logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 8px;
        }

        .ticket-logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .ticket-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
            backdrop-filter: blur(4px);
        }

        .ticket-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .ticket-subtitle {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        /* Cuerpo del Acuse */
        .ticket-body {
            padding: 30px 24px;
        }

        /* Sección de estatus de cita destacado */
        .status-banner {
            display: flex;
            align-items: center;
            gap: 12px;
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .status-banner.pending {
            background-color: #fef3c7;
            border-color: #fde68a;
            color: #92400e;
        }

        .status-banner i {
            font-size: 1.2rem;
        }

        /* Listado de Datos del Candidato */
        .info-grid {
            display: grid;
            gap: 20px;
            margin-bottom: 25px;
        }

        .info-item {
            border-bottom: 1px dashed #e2e8f0;
            padding-bottom: 10px;
        }

        .info-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
            display: block;
        }

        .info-value {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Contenedor del QR */
        .qr-section {
            text-align: center;
            padding: 20px;
            background: #f8fafc;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 25px;
        }

        .qr-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 10px auto;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qr-help {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Panel de botones flotantes / de acción */
        .action-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-print {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .btn-print:hover {
            background-color: var(--primary-dark);
        }

        .btn-whatsapp-follow {
            background-color: #25d366;
            color: white;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.15);
        }

        .btn-whatsapp-follow:hover {
            background-color: #128c7e;
        }

        /* ==========================================
           REGLAS DE IMPRESIÓN PROFESIONALES
           ========================================== */
        @media print {
            body {
                background-color: white;
                padding: 0;
                color: #000;
            }

            .container {
                max-width: 100%;
            }

            .ticket-card {
                box-shadow: none;
                border: none;
            }

            .ticket-header {
                background: #f1f5f9 !important;
                color: #000 !important;
                border-bottom: 2px solid #000;
                padding: 15px;
            }

            .ticket-badge, .wave-decor, .action-group, .qr-help {
                display: none !important; /* Ocultar elementos innecesarios */
            }

            .ticket-logo {
                border: 1px solid #ccc;
                background: white !important;
            }

            .info-item {
                border-bottom: 1px dashed #000;
            }

            .info-value {
                color: #000 !important;
            }
        }
    </style>
</head>
<body>
<!-- CONTENEDOR PRINCIPAL -->
    <div class="container">
        <div class="ticket-card" id="ticketCard" style="display: none;">
            
            <!-- Cabecera del Ticket (Se pintará dinámicamente) -->
            <header class="ticket-header" id="ticketHeader">
                <div class="ticket-logo" id="ticketLogoContainer">
                    <i class="fa-solid fa-circle-notch fa-spin" style="color: var(--primary-color); font-size: 1.5rem;"></i>
                </div>
                <span class="ticket-badge" id="ticketBadge">Acuse Oficial</span>
                <h2 class="ticket-title" id="companyName">Cargando Empresa...</h2>
                <p class="ticket-subtitle" id="vacantTitle">Verificando postulación en el sistema...</p>
                
                <!-- Decoración de curva elegante en la base de la cabecera -->
                <svg class="wave-decor" viewBox="0 0 120 28" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M0 15Q30 0 60 15T120 15V28H0Z"></path>
                </svg>
            </header>

            <!-- Cuerpo del Ticket (Se inyectará dinámicamente en el Bloque 3) -->
            <div class="ticket-body" id="ticketBody">
                <div style="text-align: center; padding: 40px 0;" id="loadingSpinner">
                    <i class="fa-solid fa-spinner fa-spin" style="font-size: 2.5rem; color: var(--primary-color); margin-bottom: 15px;"></i>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Buscando tu registro en la base de datos...</p>
                </div>
            </div>

        </div>
    </div>

    <!-- SDKs de Firebase (Versión Compat para navegador) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ==========================================
        // 1. CONFIGURACIÓN DE FIREBASE
        // ==========================================
        // REEMPLAZA ESTOS DATOS CON LAS CREDENCIALES DE TU PROYECTO
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            databaseURL: "TU_DATABASE_URL",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==========================================
        // 2. CAPTURA DEL ID DE POSTULACIÓN DE LA URL
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const idPostulacion = urlParams.get('id'); // Lee ?id=-Nxxxxxxxxx

        // Referencias a elementos del DOM
        const ticketCard = document.getElementById('ticketCard');
        const ticketBody = document.getElementById('ticketBody');
        const ticketHeader = document.getElementById('ticketHeader');
        const companyName = document.getElementById('companyName');
        const vacantTitle = document.getElementById('vacantTitle');
        const ticketLogoContainer = document.getElementById('ticketLogoContainer');

        // Variables de control global
        let datosPostulacionGlobal = null;
// ==========================================
        // 3. CONSULTA Y RENDIMIENTO DE DATOS
        // ==========================================

        if (idPostulacion) {
            // Buscamos la postulación por su ID único
            db.ref(`postulaciones/${idPostulacion}`).once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        datosPostulacionGlobal = snapshot.val();
                        
                        // Una vez que tenemos la postulación, cargamos el branding de su empresa
                        cargarBrandingEmpresa(datosPostulacionGlobal.id_empresa, datosPostulacionGlobal);
                    } else {
                        mostrarError("Registro No Encontrado", "El enlace es inválido o el acuse ha sido removido del sistema.");
                    }
                })
                .catch((error) => {
                    console.error("Error al consultar la postulación:", error);
                    mostrarError("Error de Conexión", "No pudimos conectar con el servidor para validar tu acuse.");
                });
        } else {
            mostrarError("Falta ID de Acuse", "No se especificó ningún identificador de postulación en la barra de direcciones.");
        }

        // Función para consultar las variables de diseño de la empresa
        function cargarBrandingEmpresa(idEmpresa, datosPostulacion) {
            db.ref(`empresas/${idEmpresa}`).once('value')
                .then((snapshot) => {
                    let datosEmpresa = null;
                    if (snapshot.exists()) {
                        datosEmpresa = snapshot.val();
                        
                        // Aplicamos colores corporativos dinámicos
                        const colorPrimario = datosEmpresa.color_primario || '#2563eb';
                        const colorOscuro = datosEmpresa.color_oscuro || '#1d4ed8';
                        
                        document.documentElement.style.setProperty('--primary-color', colorPrimario);
                        document.documentElement.style.setProperty('--primary-dark', colorOscuro);

                        // Pinta logo oficial
                        if (datosEmpresa.logo_url) {
                            ticketLogoContainer.innerHTML = `
                                <img src="${datosEmpresa.logo_url}" alt="Logo ${datosEmpresa.nombre}" onerror="this.src='https://via.placeholder.com/150?text=Logo'">
                            `;
                        } else {
                            ticketLogoContainer.innerHTML = `<i class="fa-solid fa-briefcase" style="color: ${colorPrimario}; font-size: 2rem;"></i>`;
                        }
                    } else {
                        // Branding genérico si la empresa ya no existe en configuración
                        ticketLogoContainer.innerHTML = `<i class="fa-solid fa-file-invoice" style="color: var(--primary-color); font-size: 2rem;"></i>`;
                    }

                    // Procedemos a pintar la interfaz del acuse
                    pintarInterfazAcuse(datosPostulacion, datosEmpresa);
                });
        }

        // Función principal para renderizar los datos del candidato en pantalla
        function pintarInterfazAcuse(postulacion, empresa) {
            // Mostrar tarjeta principal y remover spinner temporal
            ticketCard.style.display = 'block';
            
            // Actualizar Cabecera
            companyName.textContent = postulacion.empresa_nombre || 'Empresa Aliada';
            vacantTitle.textContent = postulacion.vacant_puesto || 'Postulación Registrada';

            // Determinar banner y texto del estado de la cita
            let bannerHtml = '';
            const citaInfo = postulacion.cita || {};

            if (citaInfo.solicitada_por_candidato) {
                if (citaInfo.estatus === "pendiente_confirmacion") {
                    bannerHtml = `
                        <div class="status-banner pending">
                            <i class="fa-solid fa-clock-rotate-left"></i>
                            <div>
                                <strong>Entrevista propuesta:</strong> Tu cita para el día <strong>${formatearFecha(citaInfo.fecha)}</strong> a las <strong>${citaInfo.hora} hrs</strong> está en proceso de validación por tu reclutador.
                            </div>
                        </div>
                    `;
                } else if (citaInfo.estatus === "confirmada") {
                    bannerHtml = `
                        <div class="status-banner">
                            <i class="fa-solid fa-calendar-check"></i>
                            <div>
                                <strong>¡Cita Confirmada!</strong> Te esperamos el <strong>${formatearFecha(citaInfo.fecha)}</strong> a las <strong>${citaInfo.hora} hrs</strong> en planta. ¡No olvides llevar este acuse!
                            </div>
                        </div>
                    `;
                }
            } else {
                bannerHtml = `
                    <div class="status-banner pending" style="background-color: #f0f9ff; border-color: #bae6fd; color: #075985;">
                        <i class="fa-solid fa-circle-info"></i>
                        <div>
                            <strong>Postulación completada:</strong> Un reclutador se pondrá en contacto contigo a la brevedad para coordinar la fecha y hora de tu entrevista en planta.
                        </div>
                    </div>
                `;
            }

            // Inyectamos el cuerpo del acuse con su información segmentada
            ticketBody.innerHTML = `
                ${bannerHtml}

                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">Candidato</span>
                        <div class="info-value">${postulacion.nombre_candidato}</div>
                    </div>
                    
                    <div class="info-item">
                        <span class="info-label">CURP</span>
                        <div class="info-value" style="letter-spacing: 1px;">${postulacion.curp}</div>
                    </div>

                    <div class="info-item">
                        <span class="info-label">Teléfono de Contacto</span>
                        <div class="info-value">${postulacion.telefono}</div>
                    </div>

                    <div class="info-item">
                        <span class="info-label">Puesto y Planta</span>
                        <div class="info-value">${postulacion.vacante_puesto}</div>
                    </div>

                    <div class="info-item">
                        <span class="info-label">Ruta de Transporte Solicitada</span>
                        <div class="info-value"><i class="fa-solid fa-bus" style="font-size: 0.85rem; margin-right: 5px; color: var(--primary-color);"></i> ${postulacion.ruta_transporte}</div>
                    </div>

                    <div class="info-item">
                        <span class="info-label">Reclutador Asignado</span>
                        <div class="info-value">${postulacion.nombre_reclutador}</div>
                    </div>

                    <div class="info-item">
                        <span class="info-label">Folio Digital de Registro</span>
                        <div class="info-value" style="font-family: monospace; font-size: 0.85rem; color: var(--text-muted);">${postulacion.id}</div>
                    </div>
                </div>

                <!-- SECCIÓN DE QR Y BOTONES DE ACCIÓN (Se integrará en el Bloque 4) -->
                <div id="qrYAccionesContenedor"></div>
            `;
        }

        // Funciones auxiliares útiles
        function formatearFecha(fechaString) {
            if (!fechaString || fechaString.includes("Pendiente")) return fechaString;
            const partes = fechaString.split('-');
            if (partes.length !== 3) return fechaString;
            // Formato visual amigable: DD/MM/AAAA
            return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }

        function mostrarError(titulo, descripcion) {
            const container = document.querySelector('.container');
            container.innerHTML = `
                <div class="ticket-card" style="display: block; border-top: 5px solid #ef4444;">
                    <div style="text-align: center; padding: 40px 20px;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size: 3.5rem; color: #ef4444; margin-bottom: 15px;"></i>
                        <h2 style="font-weight: 700; font-size: 1.4rem; margin-bottom: 8px;">${titulo}</h2>
                        <p style="color: var(--text-muted); font-size: 0.9rem; max-width: 350px; margin: 0 auto 25px auto;">${descripcion}</p>
                        <a href="index.html" class="btn-action btn-print" style="max-width: 200px; margin: 0 auto; text-decoration: none;">
                            <i class="fa-solid fa-house"></i> Ir al Inicio
                        </a>
                    </div>
                </div>
            `;
        }
// ==========================================
        // 4. GENERACIÓN DE CÓDIGO QR Y ACCIONES
        // ==========================================

        // Inyectamos la librería de generación de QR de forma dinámica y segura
        const scriptQR = document.createElement('script');
        scriptQR.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
        scriptQR.onload = () => {
            // Una vez cargada la librería, procedemos a renderizar el contenedor de QR y botones
            const qrYAccionesContenedor = document.getElementById('qrYAccionesContenedor');
            if (!qrYAccionesContenedor || !datosPostulacionGlobal) return;

            qrYAccionesContenedor.innerHTML = `
                <!-- SECCIÓN DEL CÓDIGO QR -->
                <div class="qr-section">
                    <div class="qr-container" id="qrcode"></div>
                    <p class="qr-help">
                        <i class="fa-solid fa-qrcode"></i> Presenta este código QR al llegar a la planta para validar tu postulación.
                    </p>
                </div>

                <!-- GRUPO DE BOTONES DE ACCIÓN -->
                <div class="action-group">
                    <button type="button" class="btn-action btn-print" id="btnImprimir">
                        <i class="fa-solid fa-print"></i> Imprimir o Guardar en PDF
                    </button>
                    
                    <a href="#" class="btn-action btn-whatsapp-follow" id="btnWhatsappSeguimiento" target="_blank">
                        <i class="fa-brands fa-whatsapp"></i> Preguntar a mi Reclutador
                    </a>
                </div>
            `;

            // 1. Generar el código QR con enlace de validación administrativa
            const urlValidacionAdmin = `${window.location.origin}/admin.html?validar=${datosPostulacionGlobal.id}`;
            
            new QRCode(document.getElementById("qrcode"), {
                text: urlValidacionAdmin,
                width: 130,
                height: 130,
                colorDark: "#1e293b", // Color del QR a juego con nuestra paleta
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // 2. Listener para el botón de impresión nativa
            const btnImprimir = document.getElementById('btnImprimir');
            btnImprimir.addEventListener('click', () => {
                window.print(); // Ejecuta las directrices CSS de @media print configuradas en el Bloque 1
            });

            // 3. Configurar enlace directo de seguimiento por WhatsApp con su reclutador
            configurarBotonSeguimiento(datosPostulacionGlobal);
        };

        // Adjuntar script al documento
        document.head.appendChild(scriptQR);

        // Función para preparar el chat de seguimiento con el reclutador asignado
        function configurarBotonSeguimiento(postulacion) {
            const btnWhatsappSeguimiento = document.getElementById('btnWhatsappSeguimiento');
            if (!btnWhatsappSeguimiento) return;

            // Obtener datos del reclutador desde el registro actual
            let telReclutador = "";
            
            // Buscaremos el teléfono del reclutador para estructurar la API
            db.ref(`reclutadores/${postulacion.id_reclutador}`).once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        telReclutador = snapshot.val().telefono || "";
                    }

                    const mensajeSeguimiento = `*Hola, ${postulacion.nombre_reclutador}!* 🙋‍♂️\n\n` +
                        `Me registré para la vacante de *${postulacion.vacante_puesto}* en la plataforma digital.\n` +
                        `Mi CURP es: *${postulacion.curp}*.\n\n` +
                        `Quisiera confirmar los detalles de mi postulación y el estatus de mi cita. Adjunto mi enlace de acuse oficial:\n` +
                        `${window.location.href}`;

                    // Asignamos la dirección URL estructurada al botón de acción
                    btnWhatsappSeguimiento.href = `https://api.whatsapp.com/send?phone=52${telReclutador}&text=${encodeURIComponent(mensajeSeguimiento)}`;
                });
        }
    </script>
</body>
</html>
