<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Postulación de Vacante | Portal de Reclutamiento</title>
    <!-- FontAwesome para iconos modernos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Variables de Estilo Dinámicas (Se actualizarán con JS según la empresa) */
        :root {
            --primary-color: #2563eb; /* Color por defecto */
            --primary-dark: #1d4ed8;
            --bg-light: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --border-radius: 16px;
            --transition-speed: 0.3s;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        /* Contenedor Principal */
        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 15px;
        }

        /* Banner de la Empresa con SVG de Fondo */
        .company-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            border-radius: var(--border-radius);
            padding: 30px 20px;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* Efecto de curva decorativa de fondo */
        .company-header::before {
            content: '';
            position: absolute;
            bottom: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        .company-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            padding: 10px;
        }

        .company-logo img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .company-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .vacant-title {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 400;
        }

        /* Tarjetas de Información */
        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e2e8f0;
            transition: transform var(--transition-speed);
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-color);
        }

        /* Elementos del Formulario Estilizados */
        .form-group {
            margin-bottom: 18px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: all var(--transition-speed);
            outline: none;
            background-color: #f8fafc;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        /* Switch de Autocita Elegante */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .toggle-label-group {
            display: flex;
            flex-direction: column;
        }

        .toggle-title {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .toggle-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
        }

        input:checked + .slider:before {
            transform: translateX(22px);
        }

        /* Bloque de Agenda (Oculto por defecto con animación) */
        .agenda-block {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out, opacity 0.3s ease-out;
            opacity: 0;
        }

        .agenda-block.show {
            max-height: 300px;
            opacity: 1;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #e2e8f0;
        }

        /* Botón de Postulación */
        .btn-submit {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-speed);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-submit:hover {
            background-color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
<!-- CONTENEDOR PRINCIPAL DE LA VACANTE -->
    <div class="container">
        
        <!-- ENCABEZADO DINÁMICO (Se pinta con los datos de la empresa) -->
        <header class="company-header" id="companyHeader">
            <div class="company-logo" id="companyLogoContainer">
                <!-- Icono de carga temporal mientras lee la base de datos -->
                <i class="fa-solid fa-circle-notch fa-spin" style="color: var(--primary-color); font-size: 1.5rem;"></i>
            </div>
            <h1 class="company-name" id="companyName">Cargando empresa...</h1>
            <p class="vacant-title" id="vacantTitle">Buscando vacante disponible...</p>
        </header>

        <!-- Aquí se irán colocando las tarjetas de los siguientes bloques -->
        <main id="mainContent">
            <!-- La tarjeta del formulario y geolocalización se construirán en los bloques 3 y 4 -->
        </main>

    </div>

    <!-- SDKs de Firebase (Versión Compat para uso directo en navegador) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // ==========================================
        // 1. CONFIGURACIÓN DE FIREBASE
        // ==========================================
        // REEMPLAZA ESTOS DATOS CON LAS CREDENCIALES DE TU PROYECTO
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_AUTH_DOMAIN",
            databaseURL: "TU_DATABASE_URL",
            projectId: "TU_PROJECT_ID",
            storageBucket: "TU_STORAGE_BUCKET",
            messagingSenderId: "TU_MESSAGING_SENDER_ID",
            appId: "TU_APP_ID"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==========================================
        // 2. CAPTURA DE PARÁMETROS DE LA URL (Query Params)
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        const idEmpresaUrl = urlParams.get('empresa'); // Ej: ?empresa=Soriana o ?empresa=FIMEX

        // Variables globales para el estado de la página
        let datosEmpresaGlobal = null;

        // Función para aplicar el Branding de la Empresa de forma dinámica
        function aplicarBranding(datosEmpresa) {
            if (!datosEmpresa) return;

            // Cambiar variables de CSS en caliente para pintar todo el sitio
            const colorPrimario = datosEmpresa.color_primario || '#2563eb';
            const colorOscuro = datosEmpresa.color_oscuro || '#1d4ed8';
            
            document.documentElement.style.setProperty('--primary-color', colorPrimario);
            document.documentElement.style.setProperty('--primary-dark', colorOscuro);

            // Actualizar textos e imagen del Header
            document.getElementById('companyName').textContent = datosEmpresa.nombre || 'Empresa Aliada';
            
            if (datosEmpresa.logo_url) {
                document.getElementById('companyLogoContainer').innerHTML = `
                    <img src="${datosEmpresa.logo_url}" alt="Logo ${datosEmpresa.nombre}" onerror="this.src='https://via.placeholder.com/150?text=Logo'">
                `;
            } else {
                // Si no tiene logo, ponemos un icono genérico de maletín de oficina
                document.getElementById('companyLogoContainer').innerHTML = `
                    <i class="fa-solid fa-briefcase" style="color: ${colorPrimario}; font-size: 2rem;"></i>
                `;
            }
        }

        // ==========================================
        // 3. CONSULTA DE DATOS DE LA EMPRESA EN FIREBASE
        // ==========================================
        if (idEmpresaUrl) {
            // Buscamos directamente en el nodo de configuración de empresas
            db.ref(`empresas/${idEmpresaUrl}`).once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        datosEmpresaGlobal = snapshot.val();
                        aplicarBranding(datosEmpresaGlobal);
                    } else {
                        console.error("La empresa especificada no existe en la base de datos.");
                        document.getElementById('companyName').textContent = "Vacantes Disponibles";
                        document.getElementById('companyLogoContainer').innerHTML = `<i class="fa-solid fa-triangle-exclamation" style="color: #ef4444; font-size: 2rem;"></i>`;
                    }
                })
                .catch((error) => {
                    console.error("Error al conectar con Firebase:", error);
                });
        } else {
            // Comportamiento genérico si acceden sin ?empresa=
            document.getElementById('companyName').textContent = "Portal de Empleo";
            document.getElementById('companyLogoContainer').innerHTML = `<i class="fa-solid fa-globe" style="color: var(--primary-color); font-size: 2rem;"></i>`;
            document.getElementById('vacantTitle').textContent = "Selecciona una empresa aliada";
        }
// ==========================================
        // 4. LÓGICA DE GEOLOCALIZACIÓN Y DISTANCIA
        // ==========================================
        
        // Estructura HTML de la sección de Geolocalización (Se inyectará dinámicamente)
        const mainContent = document.getElementById('mainContent');
        
        // Insertamos la tarjeta de ubicación al inicio del contenedor
        mainContent.innerHTML = `
            <!-- TARJETA DE GEOLOCALIZACIÓN -->
            <div class="card" id="geoCard">
                <h3 class="card-title">
                    <i class="fa-solid fa-location-crosshairs"></i> Encuentra tu planta ideal
                </h3>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px;">
                    Compártenos tu ubicación aproximada para mostrarte automáticamente las vacantes, turnos y rutas de transporte que pasan más cerca de tu casa. ¡Es totalmente gratis!
                </p>
                <button type="button" class="btn-submit" id="btnGeolocalizar" style="background-color: #64748b; box-shadow: none;">
                    <i class="fa-solid fa-map-pin"></i> Usar mi ubicación actual
                </button>
                <div id="geoFeedback" style="margin-top: 10px; font-size: 0.85rem; text-align: center; font-weight: 500; display: none;"></div>
            </div>

            <!-- CONTENEDOR DE LA VACANTE DETALLADA (Bloque 4) -->
            <div id="vacanteDetalleContenedor"></div>
        `;

        // Variables para almacenar las coordenadas del candidato
        let coordsCandidato = null;

        // Función matemática de Haversine para calcular distancia entre dos coordenadas (Lat/Lon)
        function calcularDistanciaKm(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radio de la Tierra en kilómetros
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = 
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            const distancia = R * c; 
            return parseFloat(distancia.toFixed(2)); // Retorna la distancia con 2 decimales
        }

        // Listener del botón de geolocalización
        const btnGeolocalizar = document.getElementById('btnGeolocalizar');
        const geoFeedback = document.getElementById('geoFeedback');

        btnGeolocalizar.addEventListener('click', () => {
            if (!navigator.geolocation) {
                geoFeedback.style.color = '#ef4444';
                geoFeedback.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Tu navegador no soporta geolocalización.';
                geoFeedback.style.display = 'block';
                return;
            }

            btnGeolocalizar.disabled = true;
            btnGeolocalizar.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Obteniendo ubicación...';
            geoFeedback.style.display = 'none';

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    coordsCandidato = {
                        lat: position.coords.latitude,
                        lon: position.coords.longitude
                    };

                    // Guardamos temporalmente en el dispositivo para no volver a pedirlo de inmediato
                    localStorage.setItem('user_lat', coordsCandidato.lat);
                    localStorage.setItem('user_lon', coordsCandidato.lon);

                    btnGeolocalizar.style.backgroundColor = '#10b981'; // Verde de éxito
                    btnGeolocalizar.style.boxShadow = '0 4px 12px rgba(16, 185, 129, 0.2)';
                    btnGeolocalizar.innerHTML = '<i class="fa-solid fa-check"></i> Ubicación obtenida correctamente';
                    
                    geoFeedback.style.color = '#10b981';
                    geoFeedback.innerHTML = '¡Listo! Hemos adaptado las opciones de transporte y vacantes a tu zona.';
                    geoFeedback.style.display = 'block';

                    // Disparar recálculo de distancias si ya cargaron las vacantes
                    if (typeof ordenarVacantesPorCercania === 'function') {
                        ordenarVacantesPorCercania();
                    }
                },
                (error) => {
                    console.warn("Error de geolocalización:", error);
                    btnGeolocalizar.disabled = false;
                    btnGeolocalizar.style.backgroundColor = '#64748b';
                    btnGeolocalizar.innerHTML = '<i class="fa-solid fa-map-pin"></i> Intentar de nuevo';
                    
                    geoFeedback.style.color = '#f59e0b'; // Naranja preventivo
                    let mensajeError = "No pudimos acceder a tu ubicación. Puedes continuar seleccionando tus datos manualmente.";
                    if (error.code === error.PERMISSION_DENIED) {
                        mensajeError = "Permiso denegado. Si lo deseas, puedes habilitar la ubicación en la barra de direcciones de tu navegador.";
                    }
                    geoFeedback.innerHTML = `<i class="fa-solid fa-circle-info"></i> ${mensajeError}`;
                    geoFeedback.style.display = 'block';
                },
                {
                    enableHighAccuracy: true,
                    timeout: 8000,
                    maximumAge: 3600000 // Acepta ubicaciones guardadas en caché de hasta 1 hora
                }
            );
        });

        // Autocargar ubicación si ya existe en localStorage para agilizar procesos recurrentes
        window.addEventListener('load', () => {
            const cachedLat = localStorage.getItem('user_lat');
            const cachedLon = localStorage.getItem('user_lon');
            if (cachedLat && cachedLon) {
                coordsCandidato = {
                    lat: parseFloat(cachedLat),
                    lon: parseFloat(cachedLon)
                };
                btnGeolocalizar.style.backgroundColor = '#10b981';
                btnGeolocalizar.innerHTML = '<i class="fa-solid fa-check-double"></i> Ubicación guardada cargada';
                geoFeedback.style.color = '#10b981';
                geoFeedback.innerHTML = 'Hemos adaptado automáticamente las opciones a tu última ubicación guardada.';
                geoFeedback.style.display = 'block';
            }
        });
// ==========================================
        // 5. RENDERIZADO DEL FORMULARIO DINÁMICO
        // ==========================================
        const vacanteDetalleContenedor = document.getElementById('vacanteDetalleContenedor');

        // Inyectamos el HTML del Formulario en el contenedor
        vacanteDetalleContenedor.innerHTML = `
            <form id="formPostulacion" class="card" style="display: none;">
                <h3 class="card-title">
                    <i class="fa-solid fa-file-signature"></i> Formulario de Postulación
                </h3>

                <!-- Datos Personales -->
                <div class="form-group">
                    <label class="form-label" for="nombreCompleto">Nombre Completo</label>
                    <input type="text" id="nombreCompleto" class="form-control" placeholder="Ej. Juan Pérez Gómez" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label class="form-label" for="curp">CURP (18 caracteres)</label>
                    <input type="text" id="curp" class="form-control" placeholder="ABC123456XYZ" maxlength="18" style="text-transform: uppercase;" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="telefono">Teléfono (10 dígitos)</label>
                    <input type="tel" id="telefono" class="form-control" placeholder="8112345678" maxlength="10" required autocomplete="tel">
                </div>

                <!-- Selección de Vacante Dinámica -->
                <div class="form-group">
                    <label class="form-label" for="selectVacante">¿A qué puesto te postulas?</label>
                    <select id="selectVacante" class="form-control" required>
                        <option value="">Selecciona una opción...</option>
                    </select>
                </div>

                <!-- Selector de Transporte (Dependiente de la Vacante) -->
                <div class="form-group" id="grupoTransporte" style="display: none;">
                    <label class="form-label" for="selectTransporte">¿Qué ruta de transporte te queda más cerca?</label>
                    <select id="selectTransporte" class="form-control">
                        <option value="">Selecciona una ruta...</option>
                        <option value="No necesito transporte">No necesito transporte de personal</option>
                    </select>
                </div>

                <!-- Selección de Reclutador Activo -->
                <div class="form-group">
                    <label class="form-label" for="selectReclutador">¿Quién es tu reclutador asignado?</label>
                    <select id="selectReclutador" class="form-control" required>
                        <option value="">Selecciona tu reclutador...</option>
                    </select>
                </div>

                <!-- SECCIÓN DE AUTOCITA OPCIONAL -->
                <div class="toggle-container" id="toggleCitaContainer">
                    <div class="toggle-label-group">
                        <span class="toggle-title"><i class="fa-solid fa-calendar-days"></i> ¿Quieres agendar tu entrevista de una vez?</span>
                        <span class="toggle-desc">Ahorra tiempo y asegura tu lugar en la planta.</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="chkAgendarCita">
                        <span class="slider"></span>
                    </</label>
                </div>

                <!-- Campos de Cita (Animados por CSS en Bloque 1) -->
                <div id="blockAgenda" class="agenda-block">
                    <div class="form-group">
                        <label class="form-label" for="fechaCita">Selecciona el día de tu entrevista</label>
                        <input type="date" id="fechaCita" class="form-control">
                        <small id="errorFecha" style="color: #ef4444; font-size: 0.75rem; display: none; margin-top: 5px;"></small>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="horaCita">Selecciona la hora de tu cita</label>
                        <input type="time" id="horaCita" class="form-control" min="08:00" max="17:00">
                        <small id="errorHora" style="color: #ef4444; font-size: 0.75rem; display: none; margin-top: 5px;"></small>
                    </div>
                </div>

                <!-- Botón de Envío -->
                <button type="submit" class="btn-submit" id="btnEnviarPostulacion" style="margin-top: 20px;">
                    <i class="fa-solid fa-paper-plane"></i> Confirmar y Enviar Postulación
                </button>
            </form>
        `;

        // Elementos del DOM del formulario
        const formPostulacion = document.getElementById('formPostulacion');
        const selectVacante = document.getElementById('selectVacante');
        const grupoTransporte = document.getElementById('grupoTransporte');
        const selectTransporte = document.getElementById('selectTransporte');
        const selectReclutador = document.getElementById('selectReclutador');
        const chkAgendarCita = document.getElementById('chkAgendarCita');
        const blockAgenda = document.getElementById('blockAgenda');
        const fechaCita = document.getElementById('fechaCita');
        const horaCita = document.getElementById('horaCita');
        const errorFecha = document.getElementById('errorFecha');
        const errorHora = document.getElementById('errorHora');

        // Mapa de rutas por vacante para carga dinámica
        let mapaRutasVacantes = {};

        // ==========================================
        // 6. CARGA DE VACANTES DESDE FIREBASE
        // ==========================================
        function cargarVacantesYReclutadores() {
            if (!idEmpresaUrl) return;

            // 1. Cargar vacantes de la empresa seleccionada
            db.ref(`vacantes_detalles/${idEmpresaUrl}`).once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        selectVacante.innerHTML = '<option value="">Selecciona una opción...</option>';
                        snapshot.forEach((childSnapshot) => {
                            const idVacante = childSnapshot.key;
                            const datosVacante = childSnapshot.val();

                            // Guardamos las rutas de transporte asociadas a esta vacante para usarlas después
                            mapaRutasVacantes[idVacante] = datosVacante.rutas_transporte || [];

                            // Añadimos la opción al select
                            const option = document.createElement('option');
                            option.value = idVacante;
                            option.textContent = `${datosVacante.puesto} - ${datosVacante.planta || ''} (${datosVacante.turno || 'Turno no especificado'})`;
                            selectVacante.appendChild(option);
                        });
                        
                        // Mostramos el formulario una vez cargada la información básica
                        formPostulacion.style.display = 'block';
                        document.getElementById('vacantTitle').textContent = "Completa tu registro aquí abajo";
                    } else {
                        document.getElementById('vacantTitle').textContent = "No hay vacantes activas en este momento";
                    }
                });

            // 2. Cargar reclutadores con estatus "activo"
            db.ref('reclutadores').once('value')
                .then((snapshot) => {
                    if (snapshot.exists()) {
                        selectReclutador.innerHTML = '<option value="">Selecciona tu reclutador...</option>';
                        snapshot.forEach((childSnapshot) => {
                            const datosReclutador = childSnapshot.val();
                            // Filtrar únicamente reclutadores activos
                            if (datosReclutador.estatus === "activo") {
                                const option = document.createElement('option');
                                option.value = childSnapshot.key;
                                option.textContent = datosReclutador.nombre;
                                // Guardamos teléfono de forma temporal en el atributo data
                                option.setAttribute('data-tel', datosReclutador.telefono || '');
                                selectReclutador.appendChild(option);
                            }
                        });
                    }
                });
        }

        // Ejecutar carga si existe la empresa
        if (idEmpresaUrl) {
            cargarVacantesYReclutadores();
        }

        // ==========================================
        // 7. EVENTOS Y VALIDACIONES EN TIEMPO REAL
        // ==========================================

        // Listener para cargar rutas de transporte según la vacante seleccionada
        selectVacante.addEventListener('change', (e) => {
            const idVacanteSeleccionada = e.target.value;
            selectTransporte.innerHTML = `
                <option value="">Selecciona una ruta...</option>
                <option value="No necesito transporte">No necesito transporte de personal</option>
            `;

            if (idVacanteSeleccionada && mapaRutasVacantes[idVacanteSeleccionada]) {
                const rutas = mapaRutasVacantes[idVacanteSeleccionada];
                if (rutas.length > 0) {
                    rutas.forEach((ruta) => {
                        const option = document.createElement('option');
                        option.value = ruta;
                        option.textContent = ruta;
                        selectTransporte.appendChild(option);
                    });
                    grupoTransporte.style.display = 'block';
                } else {
                    grupoTransporte.style.display = 'none';
                }
            } else {
                grupoTransporte.style.display = 'none';
            }
        });

        // Mostrar / Ocultar bloque de autocita con animación CSS
        chkAgendarCita.addEventListener('change', (e) => {
            if (e.target.checked) {
                blockAgenda.classList.add('show');
                fechaCita.required = true;
                horaCita.required = true;
                establecerLimitesFecha();
            } else {
                blockAgenda.classList.remove('show');
                fechaCita.required = false;
                horaCita.required = false;
                fechaCita.value = "";
                horaCita.value = "";
                errorFecha.style.display = 'none';
                errorHora.style.display = 'none';
            }
        });

        // Configurar los límites del calendario (Solo del día de mañana en adelante)
        function establecerLimitesFecha() {
            const hoy = new Date();
            // Mañana es el primer día seleccionable
            const mañana = new Date(hoy);
            mañana.setDate(hoy.getDate() + 1);

            const yyyy = mañana.getFullYear();
            const mm = String(mañana.getMonth() + 1).padStart(2, '0');
            const dd = String(mañana.getDate()).padStart(2, '0');

            fechaCita.min = `${yyyy}-${mm}-${dd}`;
        }

        // Validar que no se seleccionen sábados ni domingos
        fechaCita.addEventListener('change', (e) => {
            const fechaSeleccionada = new Date(e.target.value + 'T00:00:00'); // Evita desfase horario
            const diaSemana = fechaSeleccionada.getDay(); // 0 = Domingo, 6 = Sábado

            if (diaSemana === 0 || diaSemana === 6) {
                errorFecha.textContent = "Las citas de entrevistas solo están disponibles de Lunes a Viernes.";
                errorFecha.style.display = 'block';
                fechaCita.value = "";
            } else {
                errorFecha.style.display = 'none';
            }
        });

        // Validar que la hora esté en horario laboral (8:00 AM - 5:00 PM)
        horaCita.addEventListener('change', (e) => {
            const hora = e.target.value;
            if (hora) {
                const [horas, minutos] = hora.split(':').map(Number);
                if (horas < 8 || (horas === 17 && minutos > 0) || horas > 17) {
                    errorHora.textContent = "Las citas en planta se programan de 8:00 AM a 5:00 PM.";
                    errorHora.style.display = 'block';
                    horaCita.value = "";
                } else {
                    errorHora.style.display = 'none';
                }
            }
        });
// ==========================================
        // 8. ENVÍO DE DATOS, FILTRO ANTI-DUPLICADOS Y WHATSAPP
        // ==========================================

        formPostulacion.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Deshabilitar botón de envío para evitar múltiples clics
            const btnEnviar = document.getElementById('btnEnviarPostulacion');
            const textoOriginalBoton = btnEnviar.innerHTML;
            btnEnviar.disabled = true;
            btnEnviar.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando tu registro...';

            // 1. Obtener y limpiar datos del formulario
            const nombre = document.getElementById('nombreCompleto').value.trim();
            const curp = document.getElementById('curp').value.trim().toUpperCase();
            const telefono = document.getElementById('telefono').value.trim();
            const idVacante = selectVacante.value;
            const puestoTexto = selectVacante.options[selectVacante.selectedIndex].text;
            const rutaTransporte = selectTransporte.value || "No especificado / No requiere";
            const idReclutador = selectReclutador.value;
            const reclutadorOpt = selectReclutador.options[selectReclutador.selectedIndex];
            const nombreReclutador = reclutadorOpt.textContent;
            const telReclutador = reclutadorOpt.getAttribute('data-tel') || '';

            const agendarCitaActivo = chkAgendarCita.checked;
            const fechaCitaValor = fechaCita.value;
            const horaCitaValor = horaCita.value;

            // VALIDACIONES BÁSICAS EXTRAS (CURP de 18 caracteres y Teléfono de 10 dígitos)
            if (curp.length !== 18) {
                alert("La CURP debe tener exactamente 18 caracteres.");
                restablecerBoton();
                return;
            }
            if (telefono.length !== 10 || isNaN(telefono)) {
                alert("El número de teléfono debe tener exactamente 10 dígitos numéricos.");
                restablecerBoton();
                return;
            }

            try {
                // ==========================================
                // CONTROL DE SEGURIDAD: FILTRO ANTI-DUPLICADOS
                // ==========================================
                // Realizamos una consulta rápida buscando postulaciones con la misma CURP para la misma vacante
                const snapshotDuplicados = await db.ref('postulaciones')
                    .orderByChild('curp')
                    .equalTo(curp)
                    .once('value');

                let registroDuplicadoExistente = null;

                if (snapshotDuplicados.exists()) {
                    // Recorremos los registros coincidentes para ver si pertenecen a la misma vacante
                    snapshotDuplicados.forEach((childSnapshot) => {
                        const postulacion = childSnapshot.val();
                        if (postulacion.id_vacante === idVacante) {
                            // Si coincide el CURP y la vacante, marcamos como duplicado
                            registroDuplicadoExistente = {
                                id: childSnapshot.key,
                                ...postulacion
                            };
                        }
                    });
                }

                if (registroDuplicadoExistente) {
                    // Detener proceso y alertar amigablemente al candidato
                    alert(`¡Hola, ${nombre}! Ya detectamos un registro activo con tu CURP para esta vacante. No es necesario registrarte de nuevo.`);
                    
                    // Redirigir directamente a su acuse ya existente
                    window.location.href = `acuse.html?id=${registroDuplicadoExistente.id}`;
                    return;
                }

                // ==========================================
                // REGISTRO DE DATOS EN FIREBASE
                // ==========================================
                const nuevaPostulacionRef = db.ref('postulaciones').push();
                const nuevoIdPostulacion = nuevaPostulacionRef.key;

                // Estructura limpia y estricta del JSON de postulación
                const datosPostulacion = {
                    id: nuevoIdPostulacion,
                    id_empresa: idEmpresaUrl,
                    empresa_nombre: datosEmpresaGlobal ? datosEmpresaGlobal.nombre : 'Empresa Aliada',
                    nombre_candidato: nombre,
                    curp: curp,
                    telefono: telefono,
                    id_vacante: idVacante,
                    vacante_puesto: puestoTexto,
                    ruta_transporte: rutaTransporte,
                    id_reclutador: idReclutador,
                    nombre_reclutador: nombreReclutador,
                    fecha_registro: new Date().toISOString(),
                    lat_candidato: coordsCandidato ? coordsCandidato.lat : null,
                    lon_candidato: coordsCandidato ? coordsCandidato.lon : null,
                    cita: {
                        solicitada_por_candidato: agendarCitaActivo,
                        fecha: agendarCitaActivo ? fechaCitaValor : "Pendiente de agendar",
                        hora: agendarCitaActivo ? horaCitaValor : "Pendiente de agendar",
                        estatus: agendarCitaActivo ? "pendiente_confirmacion" : "no_solicitada"
                    }
                };

                // Guardar en Realtime Database
                await nuevaPostulacionRef.set(datosPostulacion);

                // ==========================================
                // GENERACIÓN DEL MENSAJE DE WHATSAPP AL RECLUTADOR
                // ==========================================
                let mensajeCitaText = "";
                if (agendarCitaActivo) {
                    mensajeCitaText = `\n\n📅 *Propuesta de Entrevista:* \nFecha: ${fechaCitaValor}\nHora: ${horaCitaValor} hrs. (Sujeto a confirmación)`;
                } else {
                    mensajeCitaText = `\n\n📅 *Cita de Entrevista:* Pendiente de coordinar con reclutador.`;
                }

                const mensajeWhatsApp = `*¡Nueva Postulación de Candidato!* 🚀\n\n` +
                    `👤 *Nombre:* ${nombre}\n` +
                    `📄 *CURP:* ${curp}\n` +
                    `📞 *Teléfono:* ${telefono}\n` +
                    `💼 *Vacante:* ${puestoTexto}\n` +
                    `🚌 *Transporte:* ${rutaTransporte}\n` +
                    `🤝 *Reclutador:* ${nombreReclutador}` +
                    mensajeCitaText + `\n\n` +
                    `🔗 *Enlace de Acuse Oficial:* \n` +
                    `${window.location.origin}/acuse.html?id=${nuevoIdPostulacion}`;

                // Codificar mensaje para URL segura
                const urlWhatsApp = `https://api.whatsapp.com/send?phone=52${telReclutador}&text=${encodeURIComponent(mensajeWhatsApp)}`;

                // Informar al candidato que se generará su acuse y se abrirá el chat con el reclutador
                alert("¡Postulación enviada con éxito! A continuación, se abrirá el chat de WhatsApp con tu reclutador para validar tu proceso y se descargará tu acuse oficial de registro.");

                // Abrir chat de WhatsApp en una pestaña o ventana nueva
                window.open(urlWhatsApp, '_blank');

                // Redirigir inmediatamente a la página de acuse con el ID recién generado para que la visualice en su pantalla
                window.location.href = `acuse.html?id=${nuevoIdPostulacion}`;

            } catch (error) {
                console.error("Error al procesar la postulación:", error);
                alert("Ocurrió un error inesperado al procesar tu postulación. Por favor, intenta de nuevo o comunícate con soporte.");
                restablecerBoton();
            }

            // Función auxiliar para restablecer el botón en caso de error o detención
            function restablecerBoton() {
                btnEnviar.disabled = false;
                btnEnviar.innerHTML = textoOriginalBoton;
            }
        });
    </script>
</body>
